name: GitHub Minecraft Server (Latest Stable Version)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [on-discord]

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java (Latest Minecraft Version)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21' # ১.২২+ লেটেস্ট ভার্সনের জন্য জাভা ২১ দরকার

    - name: Configure Git for Auto-Backup
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Download Paper MC Server (Auto Latest Stable)
      run: |
        if [ ! -f "server.jar" ]; then
          echo "Downloading the absolute latest stable Paper MC Server..."
          # এটি অটোমেটিক পেপারের কারেন্ট লেটেস্ট প্রোডাকশন ভার্সন ডাউনলোড করবে
          curl -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.22/builds/latest/downloads/paper-1.22-latest.jar || \
          curl -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/latest/downloads/paper-1.21.4-latest.jar
        fi
        echo "eula=true" > eula.txt

    - name: Ensure Plugins Folder Exists
      run: |
        # আপনার আপলোড করা প্লাগইনগুলো যাতে ডিলিট না হয়, শুধু ফোল্ডার নিশ্চিত করবে
        mkdir -p plugins

    - name: Install and Setup Playit.gg
      env:
        PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
      run: |
        sudo curl -SsL -o /usr/local/bin/playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
        sudo chmod +x /usr/local/bin/playit
        
        if [ -z "$PLAYIT_SECRET" ]; then
          echo "No Playit Secret found. Starting fresh setup..."
          timeout 30 playit || true
          echo "!!! CHECK ACTIONS LOGS FOR THE CLAIM LINK !!!"
        fi

    - name: Start Minecraft Server (6GB RAM Optimized)
      run: |
        # প্লে-ইট রান করার একদম সঠিক মেথড (কোনো এরর আসবে না)
        playit > playit.log 2>&1 & 
        sleep 5
        echo "Starting Minecraft Server..."
        java -Xmx6144M -Xms6144M -jar server.jar nogui

    - name: Auto-Save and Push World Backup
      if: always()
      run: |
        echo "Saving world and pushing backups..."
        git add .
        git commit -m "Auto-Backup: World saved after server shutdown [skip ci]" || echo "No changes"
        git push origin main
