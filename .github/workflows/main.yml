name: GitHub Minecraft Server (Latest Fixed Version)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [on-discord]

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java (Latest Minecraft Version)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Configure Git for Auto-Backup
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Clean Old Corrupt Server File
      run: |
        # আগের নষ্ট হয়ে যাওয়া ফাইলটি ডিলিট করে ক্লিন করা হচ্ছে
        rm -f server.jar

    - name: Download Paper MC Server (Latest API Method)
      run: |
        echo "Fetching and downloading latest Paper MC build..."
        # পেপারের অফিশিয়াল এপিআই থেকে সরাসরি লেটেস্ট স্টেবল বিল্ড নামানো হচ্ছে
        LATEST_BUILD=$(curl -s https://api.papermc.io/v2/projects/paper/versions/1.21.4 | jq '.builds[-1]')
        curl -L -o server.jar "https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/${LATEST_BUILD}/downloads/paper-1.21.4-${LATEST_BUILD}.jar"
        echo "eula=true" > eula.txt

    - name: Ensure Plugins Folder Exists
      run: |
        mkdir -p plugins

    - name: Install and Setup Playit.gg
      env:
        PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
      run: |
        sudo curl -SsL -o /usr/local/bin/playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
        sudo chmod +x /usr/local/bin/playit
        
        if [ -z "$PLAYIT_SECRET" ]; then
          echo "No Playit Secret found. Starting fresh setup..."
          timeout 30 playit || true
          echo "!!! CHECK ACTIONS LOGS FOR THE CLAIM LINK !!!"
        fi

    - name: Start Minecraft Server (6GB RAM Optimized)
      run: |
        playit > playit.log 2>&1 & 
        sleep 5
        echo "Starting Minecraft Server..."
        java -Xmx6144M -Xms6144M -jar server.jar nogui

    - name: Auto-Save and Push World Backup
      if: always()
      run: |
        echo "Saving world and pushing backups..."
        git add .
        git commit -m "Auto-Backup: World saved after server shutdown [skip ci]" || echo "No changes"
        git push origin main
