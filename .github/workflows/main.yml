name: GitHub Minecraft Server (Bedrock 1.21.10+ Support)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [on-discord]

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java (Minecraft 1.21+)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Configure Git for Auto-Backup
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Download Paper MC Server (1.21.1 Base)
      run: |
        if [ ! -f "server.jar" ]; then
          echo "Downloading Paper MC 1.21.1..."
          curl -L -o server.jar https://api.papermc.io/v2/projects/paper/versions/1.21.1/builds/130/downloads/paper-1.21.1-130.jar
        fi
        echo "eula=true" > eula.txt

    - name: Install ViaVersion & Geyser (Secure Download)
      run: |
        mkdir -p plugins
        echo "Downloading Plugins cleanly..."
        
        # করাপ্ট ফাইল এড়াতে পুরনো নষ্ট ফাইল থাকলে আগে ডিলিট করবে
        rm -f plugins/ViaVersion.jar plugins/Geyser-Spigot.jar
        
        # নতুন করে সম্পূর্ণ ফাইল ডাউনলোড (Follow Redirects)
        curl -L -o plugins/ViaVersion.jar https://repo.viaversion.com/repository/viaversion-releases/com/viaversion/viaversion/5.0.4/viaversion-5.0.4.jar
        curl -L -o plugins/Geyser-Spigot.jar https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        
        # ডাউনলোড শেষ হওয়ার জন্য একটু অপেক্ষা করা
        sleep 5

    - name: Install and Setup Playit.gg
      env:
        PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
      run: |
        sudo curl -SsL -o /usr/local/bin/playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
        sudo chmod +x /usr/local/bin/playit
        
        if [ -z "$PLAYIT_SECRET" ]; then
          echo "No Playit Secret found. Starting fresh setup..."
          timeout 30 playit || true
          echo "!!! CHECK ACTIONS LOGS FOR THE CLAIM LINK !!!"
        fi

    - name: Start Minecraft Server (6GB RAM Optimized)
      run: |
        # প্লে-ইট রান করার একদম সঠিক ও সেফ লিনাক্স মেথড
        playit > playit.log 2>&1 & 
        sleep 5
        echo "Starting Minecraft Server..."
        java -Xmx6144M -Xms6144M -jar server.jar nogui

    - name: Auto-Save and Push World Backup
      if: always()
      run: |
        echo "Saving world and pushing backups..."
        git add .
        git commit -m "Auto-Backup: World saved after server shutdown [skip ci]" || echo "No changes"
        git push origin main
